name: WelldoneK
options:
  bundleIdPrefix: com.welldone-k
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
targets:
  WelldoneK:
    type: application
    platform: macOS
    sources:
      - path: WelldoneK
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.welldone-k.app
      GENERATE_INFOPLIST_FILE: true
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      PRODUCT_NAME: welldone-k
      CODE_SIGN_ENTITLEMENTS: WelldoneK/WelldoneK.entitlements
      ENABLE_PREVIEWS: true
    dependencies:
      - target: WelldoneKWidgetExtension
  WelldoneKWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: WelldoneKWidget
      - path: WelldoneK/Models.swift
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.welldone-k.app.widget
      GENERATE_INFOPLIST_FILE: true
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      PRODUCT_NAME: WelldoneKWidget
      CODE_SIGN_ENTITLEMENTS: WelldoneKWidget/WelldoneKWidget.entitlements
      LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
      INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
